# Server
server.port=${SERVER_PORT:8080}

# MongoDB (Spring Boot 4+)
# Keep database name in URI (recommended): mongodb+srv://.../chatapp?...
spring.mongodb.uri=${MONGO_URI}
spring.mongodb.database=${MONGO_DATABASE:chatapp}

# Auth
app.jwt.secret=${JWT_SECRET}
# Set REQUIRE_EMAIL_VERIFICATION=false to skip verification email and allow immediate login after register.
app.auth.require-email-verification=${REQUIRE_EMAIL_VERIFICATION:true}

# Frontend / verification link base
frontend.url=${FRONTEND_URL:http://localhost:3000}
app.client.base-url=${APP_CLIENT_BASE_URL:${frontend.url}}

# Mail
# Production on Render (free): set RESEND_API_KEY — SMTP ports 25/465/587 are blocked; use Resend HTTPS API.
app.mail.resend.api-key=${RESEND_API_KEY:}
# Must be an address/domain you verified in Resend (default works for testing: onboarding@resend.dev)
app.mail.resend.from=${RESEND_FROM:}
app.mail.from=${APP_MAIL_FROM:no-reply@chatapp.local}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}