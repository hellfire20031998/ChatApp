# Spring Boot 4+ uses spring.mongodb.* (spring.data.mongodb.* is ignored → defaults to localhost:27017)
# Atlas URI must include a database path before "?": ...mongodb.net/DATABASE?options (otherwise: "Database name must not be empty")
spring.mongodb.uri=${MONGO_URI}
spring.data.mongodb.database=${MONGO_DATABASE:chatapp}

app.jwt.secret=${JWT_SECRET}
FRONTEND_URL=http://localhost:3000
APP_CLIENT_BASE_URL=http://localhost:3000
APP_MAIL_FROM=${APP_MAIL_FROM}

MAIL_HOST=smtp.gmail.com
MAIL_PORT=587
MAIL_USERNAME=${MAIL_USERNAME}
MAIL_PASSWORD=${MAIL_PASSWORD}
MAIL_SMTP_AUTH=true
MAIL_SMTP_STARTTLS_ENABLE=true
# Production: set FRONTEND_URL (e.g. https://your-app.vercel.app)
frontend.url=${FRONTEND_URL:http://localhost:3000}
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true