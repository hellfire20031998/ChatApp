# Spring Boot 4+ uses spring.mongodb.* (spring.data.mongodb.* is ignored → defaults to localhost:27017)
# Atlas URI must include a database path before "?": ...mongodb.net/DATABASE?options (otherwise: "Database name must not be empty")
spring.mongodb.uri=${MONGO_URI}
spring.data.mongodb.database=chatapp

app.jwt.secret=${JWT_SECRET}

frontend.url=http://localhost:3000